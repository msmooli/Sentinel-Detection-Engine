name: Detection-as-Code Pipeline

# Triggers on any PR or push to main that touches Detections or Validation.
# All three gates must pass before deployment runs.
on:
  push:
    branches: [ main ]
    paths:
      - 'Detections/**'
      - 'Validation/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Detections/**'
      - 'Validation/**'

jobs:

# ══════════════════════════════════════════════════════════════════════════════
# GATE 1 — Schema Validation
# Validates every JSON file in /Detections for required fields, correct types,
# and allowed enum values. Fails fast with the specific field and filename.
# ══════════════════════════════════════════════════════════════════════════════
  schema-validation:
    name: Gate 1 — Schema Validation
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Validate detection templates
        run: |
          echo "=================================================="
          echo "  Gate 1: Validating detection rule templates"
          echo "=================================================="

          FAILED=0

          for file in Detections/*.json; do
            echo ""
            echo "Checking: $file"

            # Valid JSON
            if ! jq empty "$file" 2>/dev/null; then
              echo "  ❌ FAIL — Invalid JSON syntax in $file"
              FAILED=1
              continue
            fi

            # Required fields
            FIELDS=(
              ".resources[0].properties.displayName"
              ".resources[0].properties.description"
              ".resources[0].properties.severity"
              ".resources[0].properties.status"
              ".resources[0].properties.query"
              ".resources[0].properties.queryFrequency"
              ".resources[0].properties.queryPeriod"
              ".resources[0].properties.tactics"
              ".resources[0].properties.techniques"
              ".resources[0].properties.entityMappings"
            )

            for field in "${FIELDS[@]}"; do
              value=$(jq -r "$field" "$file" 2>/dev/null)
              if [ "$value" = "null" ] || [ -z "$value" ]; then
                echo "  ❌ FAIL — Missing required field: $field"
                FAILED=1
              fi
            done

            # Severity enum
            SEV=$(jq -r '.resources[0].properties.severity' "$file")
            if [[ ! "$SEV" =~ ^(Informational|Low|Medium|High|Critical)$ ]]; then
              echo "  ❌ FAIL — Invalid severity: '$SEV'"
              FAILED=1
            fi

            # Status enum
            STS=$(jq -r '.resources[0].properties.status' "$file")
            if [[ ! "$STS" =~ ^(Observation|Active|Deprecated)$ ]]; then
              echo "  ❌ FAIL — Invalid status: '$STS'"
              FAILED=1
            fi

            # Tactics must be an array
            TACTIC_TYPE=$(jq -r '.resources[0].properties.tactics | type' "$file" 2>/dev/null)
            if [ "$TACTIC_TYPE" != "array" ]; then
              echo "  ❌ FAIL — 'tactics' must be a JSON array"
              FAILED=1
            fi

            # entityMappings must be an array with at least one entry
            ENTITY_COUNT=$(jq '.resources[0].properties.entityMappings | length' "$file" 2>/dev/null)
            if [ "$ENTITY_COUNT" -lt 1 ] 2>/dev/null; then
              echo "  ❌ FAIL — 'entityMappings' must contain at least one entity"
              FAILED=1
            fi

            # API version check — block outdated versions
            API_VER=$(jq -r '.resources[0].apiVersion' "$file")
            if [ "$API_VER" = "2020-01-01" ] || [ "$API_VER" = "2019-01-01-preview" ]; then
              echo "  ❌ FAIL — Outdated apiVersion '$API_VER'. Use 2022-11-01-preview or later."
              FAILED=1
            fi

            if [ $FAILED -eq 0 ]; then
              echo "  ✅ PASS — $file"
            fi
          done

          echo ""
          if [ $FAILED -ne 0 ]; then
            echo "❌ Gate 1 FAILED — fix errors above and push again."
            exit 1
          fi
          echo "✅ Gate 1 PASSED — all templates valid."


# ══════════════════════════════════════════════════════════════════════════════
# GATE 2 — Attack Simulation
# Executes simulate_attack.ps1 on the designated CI test endpoint via
# Azure Run Command. Cleanup runs in if: always() — artifacts removed
# regardless of simulation success or failure.
# ══════════════════════════════════════════════════════════════════════════════
  attack-simulation:
    name: Gate 2 — Attack Simulation
    runs-on: ubuntu-latest
    needs: schema-validation
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId":       "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":       "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Ensure test VM is running
        run: |
          echo "Starting test endpoint (no-op if already running)..."
          az vm start \
            --resource-group "${{ secrets.TEST_RESOURCE_GROUP }}" \
            --name           "${{ secrets.TEST_ENDPOINT_NAME }}" \
            --no-wait
          sleep 30

      - name: Run simulation on isolated test endpoint
        run: |
          echo "=================================================="
          echo "  Gate 2: Running attack simulation"
          echo "=================================================="

          SCRIPT=$(cat Validation/simulate_attack.ps1)

          OUTPUT=$(az vm run-command invoke \
            --resource-group "${{ secrets.TEST_RESOURCE_GROUP }}" \
            --name           "${{ secrets.TEST_ENDPOINT_NAME }}" \
            --command-id     RunPowerShellScript \
            --scripts        "$SCRIPT" \
            --output json)

          echo "$OUTPUT" | jq -r '.value[0].message' 2>/dev/null || echo "$OUTPUT"

          STATUS=$(echo "$OUTPUT" | jq -r '.value[0].code' 2>/dev/null)
          if [[ "$STATUS" != *"succeeded"* ]]; then
            echo "❌ Gate 2 FAILED — simulation script returned non-zero exit."
            exit 1
          fi
          echo "✅ Gate 2 PASSED — simulation complete."

      - name: Cleanup artifacts on test endpoint
        if: always()
        run: |
          echo "Running cleanup on test endpoint..."
          az vm run-command invoke \
            --resource-group "${{ secrets.TEST_RESOURCE_GROUP }}" \
            --name           "${{ secrets.TEST_ENDPOINT_NAME }}" \
            --command-id     RunPowerShellScript \
            --scripts "
              \$svc = Get-Service -Name 'LegitMicrosoftUpdate' -ErrorAction SilentlyContinue
              if (\$svc) {
                Stop-Service 'LegitMicrosoftUpdate' -Force -ErrorAction SilentlyContinue
                sc.exe delete 'LegitMicrosoftUpdate' | Out-Null
                Write-Host 'Cleanup: service removed.'
              } else {
                Write-Host 'Cleanup: service not found, nothing to remove.'
              }
            " --output none
          echo "✅ Cleanup complete."


# ══════════════════════════════════════════════════════════════════════════════
# GATE 3 — Alert Verification
# Polls Log Analytics for expected EventIDs. Retries every 60s for up to
# 10 minutes to handle non-deterministic ingestion latency.
# ══════════════════════════════════════════════════════════════════════════════
  alert-verification:
    name: Gate 3 — Alert Verification
    runs-on: ubuntu-latest
    needs: attack-simulation
    steps:

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId":       "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":       "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Install Log Analytics CLI extension
        run: az extension add --name log-analytics --only-show-errors

      - name: Verify EventID 4697 — New Service Creation
        run: |
          echo "=================================================="
          echo "  Gate 3a: Verifying EventID 4697 in Log Analytics"
          echo "=================================================="

          MAX=10; INTERVAL=60
          for i in $(seq 1 $MAX); do
            echo "Attempt $i/$MAX..."

            COUNT=$(az monitor log-analytics query \
              --workspace "${{ secrets.LAW_WORKSPACE_ID }}" \
              --analytics-query "
                SecurityEvent
                | where EventID == 4697
                | where ServiceName == 'LegitMicrosoftUpdate'
                | where TimeGenerated > ago(15m)
                | count" \
              --output json 2>/dev/null \
              | jq -r '.[0].Count' 2>/dev/null)

            if [[ "$COUNT" =~ ^[0-9]+$ ]] && [ "$COUNT" -gt 0 ]; then
              echo "✅ EventID 4697 confirmed ($COUNT event(s))."
              break
            fi

            if [ $i -eq $MAX ]; then
              echo "❌ EventID 4697 not found after $((MAX * INTERVAL / 60)) minutes."
              echo "   Check AMA agent health and Data Collection Rule configuration."
              exit 1
            fi

            sleep $INTERVAL
          done

      - name: Verify EventID 4625 — Brute Force
        run: |
          echo "=================================================="
          echo "  Gate 3b: Verifying EventID 4625 in Log Analytics"
          echo "=================================================="

          MAX=10; INTERVAL=60
          for i in $(seq 1 $MAX); do
            echo "Attempt $i/$MAX..."

            COUNT=$(az monitor log-analytics query \
              --workspace "${{ secrets.LAW_WORKSPACE_ID }}" \
              --analytics-query "
                SecurityEvent
                | where EventID == 4625
                | where TargetUserName == 'FakeAdmin_DACTest'
                | where TimeGenerated > ago(15m)
                | count" \
              --output json 2>/dev/null \
              | jq -r '.[0].Count' 2>/dev/null)

            if [[ "$COUNT" =~ ^[0-9]+$ ]] && [ "$COUNT" -gt 0 ]; then
              echo "✅ EventID 4625 confirmed ($COUNT event(s))."
              break
            fi

            if [ $i -eq $MAX ]; then
              echo "❌ EventID 4625 not found after $((MAX * INTERVAL / 60)) minutes."
              exit 1
            fi

            sleep $INTERVAL
          done

          echo ""
          echo "=================================================="
          echo "  ✅ All gates passed. Ready to deploy."
          echo "=================================================="


# ══════════════════════════════════════════════════════════════════════════════
# DEPLOY — Sentinel Content Management sync
# Runs only on merge to main (not on PRs). Triggers Sentinel to pull
# the latest ARM templates from /Detections and activate them.
# ══════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Sentinel
    runs-on: ubuntu-latest
    needs: alert-verification
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId":       "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":       "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Trigger Sentinel repository sync
        run: |
          echo "Triggering Sentinel Content Management sync..."

          az rest \
            --method POST \
            --uri "https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.SENTINEL_RESOURCE_GROUP }}/providers/Microsoft.OperationalInsights/workspaces/${{ secrets.SENTINEL_WORKSPACE_NAME }}/providers/Microsoft.SecurityInsights/sourcecontrols/${{ secrets.SENTINEL_SOURCECONTROL_ID }}/triggerDeployment?api-version=2023-02-01" \
            --body '{}'

          echo "✅ Sync triggered. Rules will be live in Sentinel within 2-3 minutes."
          echo "   Verify: Azure Portal → Sentinel → Analytics → Active Rules"

